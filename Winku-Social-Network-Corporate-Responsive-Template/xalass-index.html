<!DOCTYPE html>
<html lang="fr">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Xalass - Partagez vos histoires anonymement" />
    <title>Xalass - Histoires Anonymes</title>
    
    <link rel="icon" href="images/fav.png" type="image/png" sizes="16x16"> 
    <link rel="stylesheet" href="css/main.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/color.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="stylesheet" href="css/xalass.css">
    
    <style>
        .landing-hero {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            text-align: center;
            padding: 20px;
        }
        
        .landing-content {
            max-width: 600px;
            color: #fff;
        }
        
        .landing-logo {
            font-size: 72px;
            margin-bottom: 20px;
        }
        
        .landing-title {
            font-size: 48px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        
        .landing-subtitle {
            font-size: 20px;
            opacity: 0.9;
            margin-bottom: 30px;
        }
        
        .landing-features {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin: 40px 0;
            flex-wrap: wrap;
        }
        
        .feature-item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .feature-icon {
            width: 60px;
            height: 60px;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 10px;
        }
        
        .feature-icon i {
            font-size: 24px;
        }
        
        .feature-text {
            font-size: 14px;
            opacity: 0.9;
        }
        
        .landing-btn {
            display: inline-block;
            padding: 15px 40px;
            background: #fff;
            color: #667eea;
            font-size: 18px;
            font-weight: bold;
            border-radius: 30px;
            text-decoration: none;
            transition: all 0.3s;
            margin: 10px;
        }
        
        .landing-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        
        .landing-btn.outline {
            background: transparent;
            color: #fff;
            border: 2px solid #fff;
        }
        
        .landing-btn.outline:hover {
            background: #fff;
            color: #667eea;
        }
        
        .loader {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        .loader-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        .loader-text {
            color: #fff;
            margin-top: 20px;
            font-size: 18px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        @media (max-width: 768px) {
            .landing-title {
                font-size: 32px;
            }
            
            .landing-subtitle {
                font-size: 16px;
            }
            
            .landing-logo {
                font-size: 48px;
            }
        }
    </style>
</head>
<body>

<!-- Loader -->
<div id="loader" class="loader">
    <div class="loader-spinner"></div>
    <div class="loader-text">Chargement...</div>
</div>

<!-- Landing Page -->
<div id="landing" class="landing-hero" style="display: none;">
    <div class="landing-content">
        <div class="landing-logo">
            <i class="fa fa-comments"></i>
        </div>
        <h1 class="landing-title">Xalass</h1>
        <p class="landing-subtitle">
            Partagez vos histoires en toute confidentialité.<br>
            100% anonyme. Zéro jugement.
        </p>
        
        <div class="landing-features">
            <div class="feature-item">
                <div class="feature-icon">
                    <i class="fa fa-shield"></i>
                </div>
                <span class="feature-text">Anonymat total</span>
            </div>
            <div class="feature-item">
                <div class="feature-icon">
                    <i class="fa fa-heart"></i>
                </div>
                <span class="feature-text">Communauté bienveillante</span>
            </div>
            <div class="feature-item">
                <div class="feature-icon">
                    <i class="fa fa-lock"></i>
                </div>
                <span class="feature-text">Données sécurisées</span>
            </div>
        </div>
        
        <div class="landing-buttons">
            <a href="xalass-login.html#register" class="landing-btn">
                <i class="fa fa-user-plus"></i> S'inscrire
            </a>
            <a href="xalass-login.html#login" class="landing-btn outline">
                <i class="fa fa-sign-in"></i> Se connecter
            </a>
        </div>
        
        <div style="margin-top: 40px; opacity: 0.8; font-size: 14px;">
            <p>Pas besoin d'email ni de téléphone.</p>
            <p>Créez un pseudonyme et partagez vos secrets.</p>
        </div>
    </div>
</div>

<script src="js/main.min.js"></script>
<script src="js/xalass.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
    // Initialiser les données de démo
    initDemoData();
    
    // Vérifier si l'utilisateur est déjà connecté
    const session = getSession();
    
    setTimeout(() => {
        document.getElementById('loader').style.display = 'none';
        
        if (session) {
            // Rediriger vers le feed
            window.location.href = 'xalass-feed.html';
        } else {
            // Afficher la landing page
            document.getElementById('landing').style.display = 'flex';
        }
    }, 1000);
});
</script>

</body>
</html>
