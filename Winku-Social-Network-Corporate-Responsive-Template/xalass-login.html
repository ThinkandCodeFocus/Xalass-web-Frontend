<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xalass - Connexion</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            width: 100%;
            max-width: 440px;
        }

        .logo-section {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo {
            font-size: 48px;
            font-weight: 800;
            color: #fff;
            letter-spacing: -2px;
            text-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }

        .logo-subtitle {
            color: rgba(255,255,255,0.9);
            font-size: 16px;
            margin-top: 8px;
            font-weight: 400;
        }

        .login-card {
            background: #fff;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
            overflow: hidden;
        }

        .tabs {
            display: flex;
            border-bottom: 1px solid #e5e7eb;
        }

        .tab {
            flex: 1;
            padding: 18px;
            text-align: center;
            font-weight: 600;
            font-size: 15px;
            color: #9ca3af;
            cursor: pointer;
            transition: all 0.3s ease;
            border-bottom: 3px solid transparent;
            background: none;
            border-top: none;
            border-left: none;
            border-right: none;
        }

        .tab:hover {
            color: #6366f1;
            background: #f9fafb;
        }

        .tab.active {
            color: #6366f1;
            border-bottom-color: #6366f1;
            background: #fff;
        }

        .tab-content {
            display: none;
            padding: 32px;
        }

        .tab-content.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: #374151;
            margin-bottom: 8px;
        }

        .form-input {
            width: 100%;
            padding: 14px 16px;
            font-size: 15px;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            transition: all 0.2s ease;
            font-family: inherit;
            background: #f9fafb;
        }

        .form-input:focus {
            outline: none;
            border-color: #6366f1;
            background: #fff;
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }

        .form-input::placeholder {
            color: #9ca3af;
        }

        .btn {
            width: 100%;
            padding: 16px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
        }

        .btn-primary {
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            color: #fff;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3);
        }

        .btn-demo {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: #fff;
            margin-top: 12px;
        }

        .btn-demo:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(16, 185, 129, 0.3);
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 24px 0;
            color: #9ca3af;
            font-size: 13px;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #e5e7eb;
        }

        .divider span {
            padding: 0 16px;
        }

        /* Avatar Selection */
        .avatar-section {
            margin-bottom: 24px;
        }

        .avatar-section-title {
            font-size: 14px;
            font-weight: 500;
            color: #374151;
            margin-bottom: 12px;
        }

        .avatar-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 10px;
        }

        .avatar-option {
            aspect-ratio: 1;
            border-radius: 50%;
            border: 3px solid transparent;
            cursor: pointer;
            transition: all 0.2s ease;
            overflow: hidden;
            background: #f3f4f6;
        }

        .avatar-option:hover {
            transform: scale(1.1);
            border-color: #e5e7eb;
        }

        .avatar-option.selected {
            border-color: #6366f1;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.3);
        }

        .avatar-option img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Error Message */
        .error-message {
            background: #fef2f2;
            border: 1px solid #fecaca;
            color: #dc2626;
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 14px;
            margin-bottom: 20px;
            display: none;
        }

        .error-message.show {
            display: block;
            animation: shake 0.3s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        /* Success Message */
        .success-message {
            background: #f0fdf4;
            border: 1px solid #bbf7d0;
            color: #16a34a;
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 14px;
            margin-bottom: 20px;
            display: none;
        }

        .success-message.show {
            display: block;
        }

        /* Footer */
        .login-footer {
            text-align: center;
            margin-top: 24px;
            color: rgba(255,255,255,0.8);
            font-size: 14px;
        }

        .login-footer a {
            color: #fff;
            text-decoration: none;
            font-weight: 500;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .login-container {
                max-width: 100%;
            }

            .logo {
                font-size: 36px;
            }

            .tab-content {
                padding: 24px;
            }

            .avatar-grid {
                grid-template-columns: repeat(6, 1fr);
                gap: 8px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo-section">
            <div class="logo">Xalass</div>
            <div class="logo-subtitle">Raconte ton histoire, anonymement</div>
        </div>

        <div class="login-card">
            <div class="tabs">
                <button class="tab active" onclick="showTab('login')">Connexion</button>
                <button class="tab" onclick="showTab('register')">Inscription</button>
            </div>

            <!-- Login Tab -->
            <div id="login-tab" class="tab-content active">
                <div id="login-error" class="error-message"></div>
                
                <form id="login-form" onsubmit="handleLogin(event)">
                    <div class="form-group">
                        <label class="form-label">Pseudonyme</label>
                        <input type="text" class="form-input" id="login-pseudo" placeholder="Ton pseudo anonyme" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Mot de passe</label>
                        <input type="password" class="form-input" id="login-password" placeholder="••••••••" required>
                    </div>

                    <button type="submit" class="btn btn-primary">Se connecter</button>
                </form>

                <div class="divider"><span>ou</span></div>

                <button class="btn btn-demo" onclick="demoLogin()">
                    🚀 Connexion démo rapide
                </button>
            </div>

            <!-- Register Tab -->
            <div id="register-tab" class="tab-content">
                <div id="register-error" class="error-message"></div>
                <div id="register-success" class="success-message"></div>

                <form id="register-form" onsubmit="handleRegister(event)">
                    <div class="form-group">
                        <label class="form-label">Pseudonyme</label>
                        <input type="text" class="form-input" id="register-pseudo" placeholder="Choisis un pseudo unique" required minlength="3">
                    </div>

                    <div class="form-group">
                        <label class="form-label">Mot de passe</label>
                        <input type="password" class="form-input" id="register-password" placeholder="Minimum 6 caractères" required minlength="6">
                    </div>

                    <div class="form-group">
                        <label class="form-label">Confirmer le mot de passe</label>
                        <input type="password" class="form-input" id="register-confirm" placeholder="Répète ton mot de passe" required>
                    </div>

                    <div class="avatar-section">
                        <div class="avatar-section-title">Choisis ton avatar</div>
                        <div class="avatar-grid" id="avatar-grid"></div>
                        <input type="hidden" id="selected-avatar" value="1">
                    </div>

                    <button type="submit" class="btn btn-primary">Créer mon compte</button>
                </form>
            </div>
        </div>

        <div class="login-footer">
            100% anonyme • Aucune donnée personnelle
        </div>
    </div>

    <script>
        // Tab switching
        function showTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            
            if (tab === 'login') {
                document.querySelectorAll('.tab')[0].classList.add('active');
                document.getElementById('login-tab').classList.add('active');
            } else {
                document.querySelectorAll('.tab')[1].classList.add('active');
                document.getElementById('register-tab').classList.add('active');
            }
        }

        // Generate avatar grid
        function generateAvatars() {
            const grid = document.getElementById('avatar-grid');
            for (let i = 1; i <= 18; i++) {
                const div = document.createElement('div');
                div.className = 'avatar-option' + (i === 1 ? ' selected' : '');
                div.onclick = () => selectAvatar(i);
                div.innerHTML = `<img src="https://api.dicebear.com/7.x/avataaars/svg?seed=${i}" alt="Avatar ${i}">`;
                grid.appendChild(div);
            }
        }

        function selectAvatar(id) {
            document.querySelectorAll('.avatar-option').forEach(a => a.classList.remove('selected'));
            event.currentTarget.classList.add('selected');
            document.getElementById('selected-avatar').value = id;
        }

        // Initialize demo data
        function initDemoData() {
            if (!localStorage.getItem('xalass_users')) {
                const users = [
                    { id: 1, pseudo: 'AnonymePoète42', password: 'demo', avatar: 3 },
                    { id: 2, pseudo: 'ConfessionNuit', password: 'demo', avatar: 7 },
                    { id: 3, pseudo: 'Mystère2024', password: 'demo', avatar: 12 }
                ];
                localStorage.setItem('xalass_users', JSON.stringify(users));
            }

            if (!localStorage.getItem('xalass_stories')) {
                const stories = [
                    {
                        id: 1,
                        authorId: 1,
                        author: 'AnonymePoète42',
                        avatar: 3,
                        title: "J'ai enfin dit la vérité à ma famille",
                        content: "Pendant 10 ans, j'ai gardé un secret qui me rongeait. Ce week-end, j'ai tout avoué. La réaction n'était pas celle que j'attendais... mais je me sens enfin libre.",
                        category: 'famille',
                        isFollowing: false,
                        likes: 47,
                        likedBy: [],
                        comments: [],
                        reports: 0,
                        createdAt: new Date(Date.now() - 3600000).toISOString()
                    },
                    {
                        id: 2,
                        authorId: 2,
                        author: 'ConfessionNuit',
                        avatar: 7,
                        title: "Mon collègue ne sait pas que c'est moi",
                        content: "Chaque jour, je laisse un petit mot d'encouragement sur son bureau. Il cherche qui c'est depuis 3 mois. Je n'oserai jamais lui dire que c'est moi qui l'aide à tenir...",
                        category: 'travail',
                        isFollowing: true,
                        likes: 128,
                        likedBy: [],
                        comments: [],
                        reports: 0,
                        createdAt: new Date(Date.now() - 7200000).toISOString()
                    },
                    {
                        id: 3,
                        authorId: 3,
                        author: 'Mystère2024',
                        avatar: 12,
                        title: "L'amour de ma vie ne sait pas que j'existe",
                        content: "On prend le même bus chaque matin. Je connais son parfum, son sourire, sa façon de lire. Mais je n'ai jamais osé lui parler. Un jour peut-être...",
                        category: 'amour',
                        isFollowing: true,
                        likes: 89,
                        likedBy: [],
                        comments: [],
                        reports: 0,
                        createdAt: new Date(Date.now() - 10800000).toISOString()
                    }
                ];
                localStorage.setItem('xalass_stories', JSON.stringify(stories));
            }
        }

        // Login handler
        function handleLogin(e) {
            e.preventDefault();
            const pseudo = document.getElementById('login-pseudo').value.trim();
            const password = document.getElementById('login-password').value;
            const errorEl = document.getElementById('login-error');

            const users = JSON.parse(localStorage.getItem('xalass_users') || '[]');
            const user = users.find(u => u.pseudo.toLowerCase() === pseudo.toLowerCase() && u.password === password);

            if (user) {
                localStorage.setItem('xalass_session', JSON.stringify({
                    userId: user.id,
                    pseudo: user.pseudo,
                    avatar: user.avatar
                }));
                window.location.href = 'xalass-feed.html';
            } else {
                errorEl.textContent = 'Pseudonyme ou mot de passe incorrect';
                errorEl.classList.add('show');
            }
        }

        // Register handler
        function handleRegister(e) {
            e.preventDefault();
            const pseudo = document.getElementById('register-pseudo').value.trim();
            const password = document.getElementById('register-password').value;
            const confirm = document.getElementById('register-confirm').value;
            const avatar = parseInt(document.getElementById('selected-avatar').value);
            const errorEl = document.getElementById('register-error');
            const successEl = document.getElementById('register-success');

            errorEl.classList.remove('show');
            successEl.classList.remove('show');

            if (password !== confirm) {
                errorEl.textContent = 'Les mots de passe ne correspondent pas';
                errorEl.classList.add('show');
                return;
            }

            const users = JSON.parse(localStorage.getItem('xalass_users') || '[]');
            
            if (users.find(u => u.pseudo.toLowerCase() === pseudo.toLowerCase())) {
                errorEl.textContent = 'Ce pseudonyme est déjà pris';
                errorEl.classList.add('show');
                return;
            }

            const newUser = {
                id: Date.now(),
                pseudo: pseudo,
                password: password,
                avatar: avatar
            };

            users.push(newUser);
            localStorage.setItem('xalass_users', JSON.stringify(users));

            successEl.textContent = 'Compte créé avec succès ! Tu peux te connecter.';
            successEl.classList.add('show');
            
            document.getElementById('register-form').reset();
            
            setTimeout(() => showTab('login'), 1500);
        }

        // Demo login
        function demoLogin() {
            initDemoData();
            localStorage.setItem('xalass_session', JSON.stringify({
                userId: 1,
                pseudo: 'AnonymePoète42',
                avatar: 3
            }));
            window.location.href = 'xalass-feed.html';
        }

        // Check if already logged in
        function checkSession() {
            const session = localStorage.getItem('xalass_session');
            if (session) {
                window.location.href = 'xalass-feed.html';
            }
        }

        // Init
        document.addEventListener('DOMContentLoaded', function() {
            generateAvatars();
            initDemoData();
            checkSession();
        });
    </script>
</body>
</html>
