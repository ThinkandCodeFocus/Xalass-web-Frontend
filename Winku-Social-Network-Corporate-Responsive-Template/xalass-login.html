<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xalass - Connexion</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            width: 100%;
            max-width: 440px;
        }

        .logo-section {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo {
            font-size: 48px;
            font-weight: 800;
            color: #fff;
            letter-spacing: -2px;
            text-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }

        .logo-subtitle {
            color: rgba(255,255,255,0.9);
            font-size: 16px;
            margin-top: 8px;
            font-weight: 400;
        }

        .login-card {
            background: #fff;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
            overflow: hidden;
        }

        .tabs {
            display: flex;
            border-bottom: 1px solid #e5e7eb;
        }

        .tab {
            flex: 1;
            padding: 18px;
            text-align: center;
            font-weight: 600;
            font-size: 15px;
            color: #9ca3af;
            cursor: pointer;
            transition: all 0.3s ease;
            border-bottom: 3px solid transparent;
            background: none;
            border-top: none;
            border-left: none;
            border-right: none;
        }

        .tab:hover {
            color: #6366f1;
            background: #f9fafb;
        }

        .tab.active {
            color: #6366f1;
            border-bottom-color: #6366f1;
            background: #fff;
        }

        .tab-content {
            display: none;
            padding: 32px;
        }

        .tab-content.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: #374151;
            margin-bottom: 8px;
        }

        .form-input {
            width: 100%;
            padding: 14px 16px;
            font-size: 15px;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            transition: all 0.2s ease;
            font-family: inherit;
            background: #f9fafb;
        }

        .form-input:focus {
            outline: none;
            border-color: #6366f1;
            background: #fff;
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }

        .form-input::placeholder {
            color: #9ca3af;
        }

        .btn {
            width: 100%;
            padding: 16px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
        }

        .btn-primary {
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            color: #fff;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3);
        }

        .btn-demo {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: #fff;
            margin-top: 12px;
        }

        .btn-demo:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(16, 185, 129, 0.3);
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 24px 0;
            color: #9ca3af;
            font-size: 13px;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #e5e7eb;
        }

        .divider span {
            padding: 0 16px;
        }

        /* Avatar Selection */
        .avatar-section {
            margin-bottom: 24px;
        }

        .avatar-section-title {
            font-size: 14px;
            font-weight: 500;
            color: #374151;
            margin-bottom: 12px;
        }

        .avatar-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 10px;
        }

        .avatar-option {
            aspect-ratio: 1;
            border-radius: 50%;
            border: 3px solid transparent;
            cursor: pointer;
            transition: all 0.2s ease;
            overflow: hidden;
            background: #f3f4f6;
        }

        .avatar-option:hover {
            transform: scale(1.1);
            border-color: #e5e7eb;
        }

        .avatar-option.selected {
            border-color: #6366f1;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.3);
        }

        .avatar-option img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Error Message */
        .error-message {
            background: #fef2f2;
            border: 1px solid #fecaca;
            color: #dc2626;
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 14px;
            margin-bottom: 20px;
            display: none;
        }

        .error-message.show {
            display: block;
            animation: shake 0.3s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        /* Success Message */
        .success-message {
            background: #f0fdf4;
            border: 1px solid #bbf7d0;
            color: #16a34a;
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 14px;
            margin-bottom: 20px;
            display: none;
        }

        .success-message.show {
            display: block;
        }

        /* Footer */
        .login-footer {
            text-align: center;
            margin-top: 24px;
            color: rgba(255,255,255,0.8);
            font-size: 14px;
        }

        .login-footer a {
            color: #fff;
            text-decoration: none;
            font-weight: 500;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .login-container {
                max-width: 100%;
            }

            .logo {
                font-size: 36px;
            }

            .tab-content {
                padding: 24px;
            }

            .avatar-grid {
                grid-template-columns: repeat(6, 1fr);
                gap: 8px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo-section">
            <div class="logo">Xalass</div>
            <div class="logo-subtitle">Raconte ton histoire, anonymement</div>
        </div>

        <div class="login-card">
            <div class="tabs">
                <button class="tab active" onclick="showTab('login')">Connexion</button>
                <button class="tab" onclick="showTab('register')">Inscription</button>
            </div>

            <!-- Login Tab -->
            <div id="login-tab" class="tab-content active">
                <div id="login-error" class="error-message"></div>
                
                <form id="login-form" onsubmit="handleLogin(event)">
                    <div class="form-group">
                        <label class="form-label">Pseudonyme</label>
                        <input type="text" class="form-input" id="login-pseudo" placeholder="Ton pseudo anonyme" required minlength="3" maxlength="10" pattern="[a-zA-Z0-9_]+">
                    </div>

                    <div class="form-group">
                        <label class="form-label">Mot de passe</label>
                        <input type="password" class="form-input" id="login-password" placeholder="••••••••" required>
                    </div>

                    <button type="submit" class="btn btn-primary">Se connecter</button>
                </form>

                <div class="divider"><span>ou</span></div>

                <button class="btn btn-demo" onclick="demoLogin()">
                    🚀 Connexion démo rapide
                </button>
            </div>

            <!-- Register Tab -->
            <div id="register-tab" class="tab-content">
                <div id="register-error" class="error-message"></div>
                <div id="register-success" class="success-message"></div>

                <form id="register-form" onsubmit="handleRegister(event)">
                    <div class="form-group">
                        <label class="form-label">Pseudonyme</label>
                        <input type="text" class="form-input" id="register-pseudo" placeholder="Choisis un pseudo unique" required minlength="3" maxlength="10" pattern="[a-zA-Z0-9_]+">
                    </div>

                    <div class="form-group">
                        <label class="form-label">Mot de passe</label>
                        <input type="password" class="form-input" id="register-password" placeholder="Minimum 6 caractères" required minlength="6">
                    </div>

                    <div class="form-group">
                        <label class="form-label">Confirmer le mot de passe</label>
                        <input type="password" class="form-input" id="register-confirm" placeholder="Répète ton mot de passe" required>
                    </div>

                    <div class="avatar-section">
                        <div class="avatar-section-title">Choisis ton avatar</div>
                        <div class="avatar-grid" id="avatar-grid"></div>
                        <input type="hidden" id="selected-avatar" value="1">
                    </div>

                    <button type="submit" class="btn btn-primary">Créer mon compte</button>
                </form>
            </div>
        </div>

        <div class="login-footer">
            100% anonyme • Aucune donnée personnelle
        </div>
    </div>

    <!-- Charger les scripts API -->
    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    
    <script>
        const AVATAR_MAP_KEY = 'xalass_avatars_by_code_name';
        const USER_AVATARS_KEY = 'xalass_user_avatars';
        const LAST_CREATED_USER_KEY = 'xalass_last_created_user_v1';

        function readJsonStorage(key, fallback) {
            try {
                const raw = localStorage.getItem(key);
                return raw ? JSON.parse(raw) : fallback;
            } catch (e) {
                return fallback;
            }
        }

        function writeJsonStorage(key, value) {
            try {
                localStorage.setItem(key, JSON.stringify(value));
            } catch (e) {
                // Ignore (quota / disabled storage)
            }
        }

        function getLastCreatedUser() {
            const u = readJsonStorage(LAST_CREATED_USER_KEY, null);
            return (u && typeof u === 'object') ? u : null;
        }

        function saveLastCreatedUser(user, avatarSeed) {
            if (!user || typeof user !== 'object') return;
            writeJsonStorage(LAST_CREATED_USER_KEY, {
                user_id: user.user_id,
                anon_uuid: user.anon_uuid,
                code_name: user.code_name,
                session_hash: user.session_hash,
                avatar: avatarSeed,
                saved_at: Date.now()
            });
        }

        function loadAvatarMap() {
            try {
                return JSON.parse(localStorage.getItem(AVATAR_MAP_KEY) || '{}') || {};
            } catch (e) {
                return {};
            }
        }

        function saveAvatarMap(map) {
            localStorage.setItem(AVATAR_MAP_KEY, JSON.stringify(map || {}));
        }

        function loadUserAvatars() {
            try {
                return JSON.parse(localStorage.getItem(USER_AVATARS_KEY) || '{}') || {};
            } catch (e) {
                return {};
            }
        }

        function saveUserAvatars(map) {
            localStorage.setItem(USER_AVATARS_KEY, JSON.stringify(map || {}));
        }

        function rememberAvatarForUser(userId, codeName, avatarSeed) {
            // Stocker par user_id
            if (userId) {
                const userAvatars = loadUserAvatars();
                userAvatars[String(userId)] = Number(avatarSeed);
                saveUserAvatars(userAvatars);
            }
            // Stocker aussi par code_name pour la compatibilité
            rememberAvatarForCodeName(codeName, avatarSeed);
        }

        function rememberAvatarForCodeName(codeName, avatarSeed) {
            const normalized = (codeName || '').trim().toLowerCase();
            const seed = Number(avatarSeed);
            if (!normalized || !Number.isFinite(seed)) return;
            const map = loadAvatarMap();
            map[normalized] = seed;
            saveAvatarMap(map);
        }

        function getRememberedAvatarForCodeName(codeName) {
            const normalized = (codeName || '').trim().toLowerCase();
            if (!normalized) return null;
            const map = loadAvatarMap();
            const seed = map[normalized];
            return Number.isFinite(seed) ? seed : null;
        }

        function getRememberedAvatarForUserId(userId) {
            if (!userId) return null;
            const userAvatars = loadUserAvatars();
            const seed = userAvatars[String(userId)];
            return Number.isFinite(seed) ? seed : null;
        }

        function resolveUserAvatarSeed(user, fallbackCodeName) {
            const direct =
                user?.avatar ??
                user?.avatar_id ??
                user?.avatar_seed;

            if (direct !== undefined && direct !== null && direct !== '') {
                const seed = Number(direct);
                return Number.isFinite(seed) ? seed : direct;
            }

            // Chercher d'abord par user_id
            if (user?.user_id) {
                const avatarByUserId = getRememberedAvatarForUserId(user.user_id);
                if (avatarByUserId !== null) return avatarByUserId;
            }

            return getRememberedAvatarForCodeName(user?.code_name || fallbackCodeName);
        }

        // Tab switching
        function showTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            
            if (tab === 'login') {
                document.querySelectorAll('.tab')[0].classList.add('active');
                document.getElementById('login-tab').classList.add('active');
            } else {
                document.querySelectorAll('.tab')[1].classList.add('active');
                document.getElementById('register-tab').classList.add('active');
            }
        }

        // Generate avatar grid
        function generateAvatars() {
            const grid = document.getElementById('avatar-grid');
            for (let i = 1; i <= 18; i++) {
                const div = document.createElement('div');
                div.className = 'avatar-option' + (i === 1 ? ' selected' : '');
                div.onclick = (event) => selectAvatar(i, event);
                div.innerHTML = `<img src="https://api.dicebear.com/7.x/avataaars/svg?seed=${i}" alt="Avatar ${i}">`;
                grid.appendChild(div);
            }
        }

        function selectAvatar(id, event) {
            document.querySelectorAll('.avatar-option').forEach(a => a.classList.remove('selected'));
            if (event && event.currentTarget) {
                event.currentTarget.classList.add('selected');
            }
            document.getElementById('selected-avatar').value = id;
        }

        function validatePseudo(pseudo) {
            return /^[a-zA-Z0-9_]{3,10}$/.test(pseudo);
        }

        // Login handler - Utilise l'API
        async function handleLogin(e) {
            e.preventDefault();
            const pseudo = document.getElementById('login-pseudo').value.trim();
            const password = document.getElementById('login-password').value;
            const errorEl = document.getElementById('login-error');
            const submitBtn = e.target.querySelector('button[type="submit"]');

            errorEl.classList.remove('show');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Connexion...';

            if (!validatePseudo(pseudo)) {
                errorEl.textContent = 'Pseudo invalide: 3 à 10 caractères, lettres/chiffres/_ uniquement.';
                errorEl.classList.add('show');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Se connecter';
                return;
            }

            try {
                const user = await api.loginAnonymousUser(pseudo, password || null);
                const avatarSeed = resolveUserAvatarSeed(user, pseudo);
                if (avatarSeed !== null && avatarSeed !== undefined) {
                    rememberAvatarForUser(user.user_id, user.code_name || pseudo, avatarSeed);
                }
                
                // Sauvegarder la session
                localStorage.setItem('xalass_session', JSON.stringify({
                    user_id: user.user_id,
                    anon_uuid: user.anon_uuid,
                    code_name: user.code_name,
                    session_hash: user.session_hash,
                    avatar: avatarSeed
                }));

                window.location.href = 'xalass-feed.html';
            } catch (error) {
                errorEl.textContent = error.message || 'Erreur de connexion. Vérifie ton pseudonyme et mot de passe.';
                errorEl.classList.add('show');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Se connecter';
            }
        }

        // Register handler - Utilise l'API
        async function handleRegister(e) {
            e.preventDefault();
            const pseudo = document.getElementById('register-pseudo').value.trim();
            const password = document.getElementById('register-password').value;
            const confirm = document.getElementById('register-confirm').value;
            const avatar = parseInt(document.getElementById('selected-avatar').value);
            const errorEl = document.getElementById('register-error');
            const successEl = document.getElementById('register-success');
            const submitBtn = e.target.querySelector('button[type="submit"]');

            errorEl.classList.remove('show');
            successEl.classList.remove('show');

            if (password !== confirm) {
                errorEl.textContent = 'Les mots de passe ne correspondent pas';
                errorEl.classList.add('show');
                return;
            }

            if (!validatePseudo(pseudo)) {
                errorEl.textContent = 'Pseudo invalide: 3 à 10 caractères, lettres/chiffres/_ uniquement.';
                errorEl.classList.add('show');
                return;
            }

            submitBtn.disabled = true;
            submitBtn.textContent = 'Création...';

            try {
                rememberAvatarForCodeName(pseudo, avatar);
                const user = await api.createAnonymousUser(pseudo, password || null, avatar);
                rememberAvatarForUser(user.user_id, user.code_name || pseudo, avatar);
                const finalCodeName = String(user?.code_name || pseudo || '').trim();
                if (finalCodeName && finalCodeName !== pseudo) {
                    successEl.textContent = `Compte créé avec succès ! Ton identifiant de connexion est: ${finalCodeName}`;
                } else {
                    successEl.textContent = 'Compte créé avec succès ! Tu peux te connecter.';
                }
                successEl.classList.add('show');

                // Pré-remplir la connexion avec le code_name réellement créé par le backend.
                const loginPseudoInput = document.getElementById('login-pseudo');
                if (loginPseudoInput && finalCodeName) {
                    loginPseudoInput.value = finalCodeName;
                }

                document.getElementById('register-form').reset();

                setTimeout(() => showTab('login'), 1500);
            } catch (error) {
                // Gestion personnalisée du message d'erreur du backend
                let customMsg = 'Erreur lors de la création du compte.';
                let errObj = error;
                // Pour debug : log l'objet d'erreur
                console.error('Erreur inscription:', error);
                // Si error est une string JSON, on tente de parser
                if (typeof error === 'string') {
                    try {
                        errObj = JSON.parse(error);
                    } catch (e) {}
                }
                // Si error est une Error JS avec un message JSON
                if (errObj && errObj.message && typeof errObj.message === 'string') {
                    try {
                        const parsed = JSON.parse(errObj.message);
                        if (parsed && typeof parsed === 'object') {
                            errObj = parsed;
                        }
                    } catch (e) {}
                }
                // Si error est imbriqué dans error.cause ou error.response
                if (errObj && errObj.cause) errObj = errObj.cause;
                if (errObj && errObj.response) errObj = errObj.response;
                // Extraction du message personnalisé
                if (errObj && errObj.message === 'Validation Failed' && errObj.messages && errObj.messages.code_name && errObj.messages.code_name[0]) {
                    customMsg = errObj.messages.code_name[0];
                } else if (errObj && errObj.messages && errObj.messages.code_name && errObj.messages.code_name[0]) {
                    customMsg = errObj.messages.code_name[0];
                } else if (errObj && errObj.message && errObj.message.includes('Ce nom d\'utilisateur est déjà utilisé')) {
                    customMsg = 'Ce nom d\'utilisateur est déjà utilisé.';
                } else if (errObj && errObj.message && errObj.message !== 'Validation Failed') {
                    customMsg = errObj.message;
                }
                errorEl.textContent = customMsg;
                errorEl.classList.add('show');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Créer mon compte';
            }
        }

        // Demo login - Crée un compte démo
        async function demoLogin() {
            try {
                // Créer un utilisateur démo avec un nom unique
                const demoCodeName = 'Demo' + Date.now();
                const demoAvatar = Math.floor(Math.random() * 18) + 1;
                rememberAvatarForCodeName(demoCodeName, demoAvatar);
                const user = await api.createAnonymousUser(demoCodeName, null, demoAvatar);
                rememberAvatarForUser(user.user_id, user.code_name || demoCodeName, resolveUserAvatarSeed(user, demoCodeName) || demoAvatar);
                
                // Sauvegarder la session
                localStorage.setItem('xalass_session', JSON.stringify({
                    user_id: user.user_id,
                    anon_uuid: user.anon_uuid,
                    code_name: user.code_name,
                    session_hash: user.session_hash,
                    avatar: resolveUserAvatarSeed(user, demoCodeName) || demoAvatar
                }));

                window.location.href = 'xalass-feed.html';
            } catch (error) {
                const errorEl = document.getElementById('login-error');
                errorEl.textContent = 'Erreur lors de la connexion démo: ' + error.message;
                errorEl.classList.add('show');
            }
        }

        // Check if already logged in
        function checkSession() {
            const session = localStorage.getItem('xalass_session');
            if (session) {
                window.location.href = 'xalass-feed.html';
            }
        }

        // Init
        document.addEventListener('DOMContentLoaded', function() {
            generateAvatars();
            checkSession();
            
            // Gérer les ancres dans l'URL (#login ou #register)
            const hash = window.location.hash;
            if (hash === '#register') {
                showTab('register');
            } else if (hash === '#login') {
                showTab('login');
            }
        });
    </script>
</body>
</html>
